<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ポケモンカード メタレポート 2026-05-20 | アーキタイプ分析</title>
  <style>
:root{
  --bg:#09111f;
  --panel:#101a31;
  --panel2:#172443;
  --text:#edf3ff;
  --muted:#aab7d3;
  --line:#2a3a67;
  --accent:#7cc7ff;
  --accent2:#8cf0b2;
  --accent3:#ffd166;
  --accent4:#ff9db2;
  --good:#74e4a7;
  --warn:#ffd166;
  --bad:#ff9a90;
}
*{box-sizing:border-box}
html{
  scroll-behavior:smooth;
  width:100%;
  max-width:100%;
  overflow-x:hidden;
  overscroll-behavior-x:none;
}
body{
  margin:0;
  width:100%;
  max-width:100%;
  overflow-x:hidden;
  overscroll-behavior-x:none;
  touch-action:pan-y;
  color:var(--text);
  font-family:"BIZ UDPGothic","Yu Gothic UI","Yu Gothic","Meiryo",sans-serif;
  background:
    radial-gradient(circle at top right, rgba(124,199,255,.10), transparent 28%),
    radial-gradient(circle at top left, rgba(140,240,178,.07), transparent 24%),
    linear-gradient(180deg,#08101d 0%,#09111f 100%);
}
a{color:inherit;text-decoration:none}
.app{display:flex;min-height:100vh;width:100%;max-width:100%;overflow-x:hidden;overscroll-behavior-x:none}
.backdrop{display:none}
.backdrop.show{display:block;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:19}
.sidebar{
  width:300px;
  background:rgba(8,14,28,.92);
  border-right:1px solid var(--line);
  padding:18px;
  position:sticky;
  top:0;
  height:100vh;
  overflow-y:auto;
  overflow-x:hidden;
  backdrop-filter:blur(14px);
}
.sidebar.hidden{transform:translateX(-100%);position:fixed;z-index:20;pointer-events:none}
.sidebar h2{margin:0 0 8px;font-size:18px}
.subtle{font-size:12px;color:var(--muted);line-height:1.65}
.side-accordion{
  margin:16px 0;
  border:1px solid var(--line);
  border-radius:16px;
  background:rgba(255,255,255,.03);
  overflow:hidden;
}
.side-accordion summary{
  list-style:none;
  cursor:pointer;
  padding:13px 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  font-size:13px;
  font-weight:700;
}
.side-accordion summary::-webkit-details-marker{display:none}
.side-accordion summary::after{
  content:"+";
  color:var(--muted);
  font-size:16px;
  line-height:1;
}
.side-accordion[open] summary::after{content:"-"}
.side-accordion-body{padding:0 10px 12px}
.side-link{
  display:block;
  padding:8px 10px;
  border-radius:12px;
  color:var(--text);
  font-size:14px;
  line-height:1.35;
  min-height:0;
  overflow:hidden;
  overscroll-behavior:none;
  touch-action:manipulation;
}
.side-link.active,.side-link:hover{background:rgba(124,199,255,.12)}
.toggle{
  position:fixed;
  left:16px;
  top:16px;
  z-index:25;
  background:#121d37;
  color:var(--text);
  border:1px solid var(--line);
  border-radius:12px;
  padding:10px 12px;
  cursor:pointer;
}
.main{
  flex:1;
  width:100%;
  max-width:100%;
  min-width:0;
  height:100vh;
  overflow:hidden;
  padding:10px 16px 12px;
  display:flex;
  flex-direction:column;
  overscroll-behavior-x:none;
}
.hero,.page-scroller,.view-section,.view-shell,.view-head,.view-stage,.panel,.grid,.tier-group,.tier-group-grid,.tier-stack-card,.tier-stack-link,.tier-stack-top,.tier-stack-stats,.table-wrap{
  max-width:100%;
}
.hero{
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  align-items:start;
  gap:10px;
  margin-bottom:6px;
  overflow:hidden;
  overscroll-behavior:none;
  touch-action:manipulation;
}
.hero-main{
  min-width:0;
  overflow:hidden;
  overscroll-behavior:none;
  touch-action:manipulation;
}
.hero .title-line,#pageTitle,#heroPeriod,.breadcrumbs{
  min-height:0;
  max-height:none;
  overflow:hidden;
  overscroll-behavior:none;
  overscroll-behavior-y:none;
  touch-action:none;
  -webkit-overflow-scrolling:auto;
}
#pageTitle{min-width:0;flex:0 1 auto}
.hero-period{
  justify-self:end;
  display:flex;
  flex-wrap:wrap;
  justify-content:flex-end;
  align-items:center;
  gap:6px 12px;
  text-align:right;
  color:var(--muted);
  font-size:13px;
  line-height:1.35;
  padding-top:0;
}
.hero-period-row{
  display:flex;
  justify-content:flex-end;
  align-items:center;
  gap:8px;
  white-space:nowrap;
}
.hero-period-label{
  color:var(--accent);
  font-size:11px;
  font-weight:800;
  letter-spacing:.04em;
  border:1px solid rgba(124,199,255,.24);
  background:rgba(124,199,255,.09);
  padding:2px 7px;
  border-radius:999px;
}
.section-kicker{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-weight:700}
h1{font-size:27px;line-height:1.05;margin:0 0 2px}
.sub{color:var(--muted);font-size:14px;line-height:1.6}
.breadcrumbs{display:flex;gap:8px;flex-wrap:wrap;font-size:13px;color:var(--muted);margin:4px 0 8px}
.sep{opacity:.5}
.page-fixed-controls{
  flex:0 0 auto;
  display:grid;
  gap:10px;
  margin:0 0 10px;
}
.page-fixed-controls:empty{display:none}
.page-scroller{
  flex:1;
  min-height:0;
  overflow-y:auto;
  overflow-x:hidden;
  display:flex;
  flex-direction:column;
  gap:12px;
  padding-right:6px;
  scroll-snap-type:y mandatory;
}
.view-section{
  flex:0 0 100%;
  height:100%;
  min-height:100%;
  max-height:100%;
  min-width:0;
  overflow:hidden;
  scroll-snap-align:start;
  scroll-snap-stop:always;
}
.view-shell{
  height:100%;
  min-height:0;
  min-width:0;
  display:flex;
  flex-direction:column;
  gap:10px;
  overflow:hidden;
}
.view-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
  padding:2px 2px 0;
  overflow:visible;
  overscroll-behavior:none;
  touch-action:manipulation;
}
.view-title{
  font-size:20px;
  line-height:1.1;
  font-weight:800;
  overflow:hidden;
  overscroll-behavior:none;
}
.title-line,
.panel-head,
.metric-head{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}
.view-head .title-line{
  overflow:visible;
  overscroll-behavior:none;
  touch-action:manipulation;
}
.view-stage{
  flex:1;
  min-height:0;
  display:flex;
  flex-direction:column;
  gap:10px;
  overflow-y:auto;
  overflow-x:hidden;
  padding-right:2px;
}
.jump-link{
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding:6px 10px;
  border:1px solid var(--line);
  border-radius:999px;
  background:rgba(255,255,255,.03);
  color:var(--muted);
  font-size:11px;
  white-space:nowrap;
}
.panel{
  background:linear-gradient(180deg,rgba(16,26,49,.98),rgba(23,36,67,.94));
  border:1px solid var(--line);
  border-radius:18px;
  padding:10px;
  box-shadow:0 8px 24px rgba(0,0,0,.24);
  min-width:0;
}
.panel-scroll{
  height:100%;
  min-height:0;
  display:flex;
  flex-direction:column;
}
.deck-summary-panel{
  overflow:hidden;
}
.aux-detail{
  margin-top:16px;
  border:1px solid rgba(255,255,255,.08);
  border-radius:18px;
  background:rgba(255,255,255,.025);
  overflow:hidden;
}
.aux-detail summary{
  list-style:none;
  cursor:pointer;
  padding:12px 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  font-size:13px;
  font-weight:700;
}
.aux-detail summary::-webkit-details-marker{display:none}
.aux-detail summary::after{
  content:"+";
  color:var(--muted);
  font-size:16px;
  line-height:1;
}
.aux-detail[open] summary::after{content:"-"}
.aux-detail-body{
  padding:0 14px 14px;
}
.section-title{font-size:17px;font-weight:700;margin:0 0 10px}
.section-sub{font-size:12px;color:var(--muted);margin:-4px 0 12px;line-height:1.6}
.panel-head .section-title,
.metric-head .label{margin:0}
.tooltip-wrap{
  position:relative;
  display:inline-flex;
  align-items:center;
  flex:0 0 auto;
  overflow:visible;
  z-index:20;
}
.help-tip{
  width:22px;
  height:22px;
  border-radius:999px;
  border:1px solid rgba(124,199,255,.32);
  background:rgba(124,199,255,.08);
  color:var(--accent);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  font-weight:700;
  cursor:help;
  padding:0;
}
.help-tip:hover,
.help-tip:focus-visible{
  outline:none;
  border-color:rgba(124,199,255,.55);
  background:rgba(124,199,255,.16);
}
.tooltip-bubble{
  position:absolute;
  top:calc(100% + 10px);
  left:50%;
  transform:translateX(-50%) translateY(-4px);
  width:clamp(220px, 28vw, 320px);
  min-width:220px;
  max-width:calc(100vw - 48px);
  padding:10px 12px;
  border-radius:14px;
  border:1px solid rgba(124,199,255,.22);
  background:rgba(12,20,38,.97);
  color:var(--text);
  font-size:12px;
  line-height:1.65;
  white-space:normal;
  word-break:normal;
  overflow-wrap:anywhere;
  box-shadow:0 18px 36px rgba(0,0,0,.32);
  opacity:0;
  visibility:hidden;
  pointer-events:none;
  transition:opacity .16s ease, transform .16s ease, visibility .16s ease;
  z-index:40;
}
.tooltip-wrap.align-left .tooltip-bubble{
  left:0;
  transform:translateX(0) translateY(-4px);
}
.tooltip-wrap.align-right .tooltip-bubble{
  left:auto;
  right:0;
  transform:translateX(0) translateY(-4px);
}
.tooltip-wrap:hover .tooltip-bubble,
.tooltip-wrap:focus-within .tooltip-bubble,
.tooltip-wrap.tip-open .tooltip-bubble{
  opacity:1;
  visibility:visible;
}
.tooltip-wrap:hover .tooltip-bubble{
  transform:translateX(-50%) translateY(0);
}
.tooltip-wrap.align-left:hover .tooltip-bubble,
.tooltip-wrap.align-left:focus-within .tooltip-bubble,
.tooltip-wrap.align-right:hover .tooltip-bubble,
.tooltip-wrap.align-right:focus-within .tooltip-bubble{
  transform:translateX(0) translateY(0);
}
@media (max-width:720px){
  .tooltip-wrap{
    overflow:visible;
    touch-action:manipulation;
  }
  .help-tip{
    touch-action:manipulation;
  }
  .tooltip-bubble{
    position:fixed;
    top:76px;
    left:12px;
    right:12px;
    width:auto;
    min-width:0;
    max-width:none;
    transform:translateY(-4px);
    z-index:80;
    pointer-events:none;
  }
  .tooltip-wrap.align-left .tooltip-bubble,
  .tooltip-wrap.align-right .tooltip-bubble{
    left:12px;
    right:12px;
    transform:translateY(-4px);
  }
  .tooltip-wrap:hover .tooltip-bubble,
  .tooltip-wrap:focus-within .tooltip-bubble,
  .tooltip-wrap.align-left:hover .tooltip-bubble,
  .tooltip-wrap.align-left:focus-within .tooltip-bubble,
  .tooltip-wrap.align-right:hover .tooltip-bubble,
  .tooltip-wrap.align-right:focus-within .tooltip-bubble{
    opacity:0;
    visibility:hidden;
    transform:translateY(-4px);
  }
  .tooltip-wrap.tip-open .tooltip-bubble,
  .tooltip-wrap.align-left.tip-open .tooltip-bubble,
  .tooltip-wrap.align-right.tip-open .tooltip-bubble{
    opacity:1;
    visibility:visible;
    transform:translateY(0);
  }
}
.grid{display:grid;gap:16px}
.grid.two{grid-template-columns:1fr 1fr}
.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}
.grid.four{grid-template-columns:repeat(4,minmax(0,1fr))}
.fill-grid{align-items:stretch}
.fill-grid > *{min-height:0}
.hero-stage{display:grid;grid-template-columns:1.15fr .85fr;gap:16px}
.season-summary-grid{display:grid;grid-template-columns:1.12fr .88fr;gap:16px}
.spotlight{
  padding:20px;
  border-radius:20px;
  border:1px solid rgba(124,199,255,.20);
  background:
    radial-gradient(circle at top right, rgba(124,199,255,.18), transparent 38%),
    linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01));
}
.eyebrow{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:8px}
.headline{font-size:24px;font-weight:800;line-height:1.15;margin:0 0 6px}
.card-summary-picker{display:grid;gap:14px}
.card-summary-toolbar{margin-bottom:12px}
.card-summary-toolbar .field{margin:0}
.card-summary-toolbar .search{font-size:16px;font-weight:700}
.deck-summary-toolbar .field{margin:0}
.deck-summary-hero-layout{
  display:grid;
  grid-template-columns:170px minmax(0,1fr);
  gap:10px;
  align-items:stretch;
  min-height:0;
  min-width:0;
  width:100%;
  max-width:100%;
  overflow:hidden;
}
.deck-summary-left{
  display:grid;
  grid-template-rows:60px minmax(0,1fr);
  gap:6px;
  min-height:0;
  min-width:0;
  overflow:hidden;
}
.deck-summary-left .card-summary-media{
  min-height:0;
}
.deck-summary-tier-card{
  display:grid;
  align-content:center;
  gap:4px;
  padding:10px 12px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.03);
  min-height:60px;
}
.deck-summary-tier-label{
  font-size:11px;
  color:var(--muted);
  font-weight:700;
}
.deck-summary-tier-value{
  font-size:22px;
  font-weight:800;
  line-height:1.05;
}
.arch-lead-card .deck-summary-tier-value{
  font-size:17px;
  line-height:1.15;
}
.arch-lead-card .deck-summary-tier-value a{
  color:var(--text);
  text-decoration:none;
}
.deck-summary-topline{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:6px;
  min-width:0;
}
.deck-summary-metric-card{
  display:grid;
  gap:3px;
  align-content:start;
  padding:7px 10px 5px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.03);
  min-height:60px;
  min-width:0;
}
.deck-summary-metric-card.usage{
  background:rgba(124,199,255,.08);
  border-color:rgba(124,199,255,.18);
}
.deck-summary-metric-card.usage .deck-summary-metric-value{
  color:#7cc7ff;
}
.deck-summary-metric-card.top4{
  background:rgba(255,209,102,.08);
  border-color:rgba(255,209,102,.18);
}
.deck-summary-metric-card.win{
  background:rgba(140,240,178,.08);
  border-color:rgba(140,240,178,.18);
}
.deck-summary-metric-main{
  display:flex;
  align-items:center;
  gap:6px;
  min-width:0;
}
.deck-summary-metric-main .tier-stat-icon{
  width:16px;
  height:16px;
}
.deck-summary-metric-value-row{
  display:flex;
  align-items:center;
  gap:4px;
  min-width:0;
}
.deck-summary-metric-value-row .tip-trigger{
  width:18px;
  height:18px;
  font-size:11px;
}
.deck-summary-metric-value{
  font-size:20px;
  font-weight:800;
  line-height:1.05;
}
.deck-summary-metric-sub{
  font-size:11px;
  font-weight:700;
  line-height:1.1;
}
.deck-summary-metric-sub.usage{color:#7cc7ff}
.deck-summary-metric-sub.top4{color:#ffd166}
.deck-summary-metric-sub.win{color:#8cf0b2}
.deck-summary-media{
  padding:0;
  overflow:hidden;
  background:#101a31;
  height:100%;
  min-height:0;
  min-width:0;
}
.deck-summary-media.split{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:2px;
  background:rgba(255,255,255,.14);
}
.deck-summary-media img{
  max-width:100%;
  max-height:100%;
  width:auto;
  height:auto;
  display:block;
  filter:saturate(1.04) contrast(1.02) brightness(.92);
}
.deck-summary-media.split img{
  width:100%;
  height:100%;
  object-fit:contain;
  object-position:center;
}
.deck-summary-media.split img + img{
  border-left:1px solid rgba(255,255,255,.16);
}
.arch-summary-media img{
  width:100%;
  height:100%;
  object-fit:contain;
  object-position:center;
}
.deck-summary-trend-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:8px;
  min-width:0;
}
.deck-summary-trend-head-main{
  display:flex;
  align-items:center;
  gap:8px;
  min-width:0;
}
.deck-summary-trend-title{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:13px;
  font-weight:800;
}
.deck-summary-delta-note{
  font-size:11px;
  color:var(--muted);
  font-weight:700;
  white-space:nowrap;
}
.deck-summary-trend-box-panel{
  padding:4px 6px;
  overflow:hidden;
  min-width:0;
}
.deck-summary-trend-box-panel .svg-wrap{
  min-height:200px;
  height:200px;
  min-width:0;
  overflow:hidden;
  width:100%;
}
.deck-summary-trend-box-panel .svg-wrap svg{
  display:block;
  width:100%;
  height:100%;
  max-width:100%;
}
.deck-summary-fallback{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--muted);
  font-size:14px;
  font-weight:700;
  background:linear-gradient(180deg,rgba(18,29,52,.96),rgba(14,23,40,.96));
}
.card-summary-focus{
  display:grid;
  grid-template-columns:120px minmax(0,1fr);
  gap:16px;
  align-items:center;
  margin-top:4px;
}
.card-summary-media{
  width:100%;
  min-height:328px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.03);

  display:flex;
  align-items:center;
  justify-content:center;
}
.card-summary-media img{
  width:100%;
  height:100%;
  object-fit:contain;
  object-position:center;
  display:block;
  background:transparent;
}
.card-summary-fallback{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;

.card-summary-fallback-text{font-size:13px;color:var(--muted);font-weight:700}

.card-summary-hero{

}
.card-summary-right{

  grid-template-rows:auto minmax(0,1fr);
  gap:4px;
  min-height:0;
  min-width:0;
  overflow:hidden;

.card-summary-metrics{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:10px;
}
.card-summary-stat{
  display:grid;
  gap:4px;

  padding:12px 14px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.03);
}
.card-summary-stat-label{
  font-size:11px;
  color:var(--muted);
  font-weight:700;
}
.card-summary-stat-value{
  font-size:24px;
  font-weight:700;
  line-height:1.1;
}
.card-summary-trend-box{
  display:flex;
  flex-direction:column;
  min-height:0;
  min-width:0;
  padding:8px 10px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.03);
}
.card-summary-trend-head{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:8px;
}
.card-summary-trend-title{
  font-size:13px;
  font-weight:700;
}
.card-summary-trend-box .svg-wrap{
  flex:1;
  min-height:260px;
  height:260px;
  min-width:0;
  padding-right:0;

.svg-wrap{
  position:relative;
  background:rgba(255,255,255,.02);
  border-radius:16px;
  padding:8px;
  border:1px solid rgba(255,255,255,.06);
}
.chart-panel .svg-wrap{flex:1;min-height:0;display:flex}
.chart-panel svg{width:100%;height:100%}
@media (max-width:1100px){
  .grid.two,.grid.three,.grid.four,.hero-stage,.rank-grid,.range-grid,.field-grid.two,.trend-layout,.movers-side,.season-summary-grid,.summary-glance-grid,.summary-insight-grid,.featured-summary,.featured-cards,.featured-baseline,.arch-breakdown-layout,.arch-breakdown-legend{grid-template-columns:1fr}
  .trend-legend{grid-template-columns:repeat(2,minmax(0,1fr))}
  .card-summary-hero{grid-template-columns:1fr}
  .card-summary-right{grid-template-rows:auto auto}
  .card-summary-metrics{grid-template-columns:1fr}
  .deck-summary-hero-layout{grid-template-columns:1fr}
  .deck-summary-left{grid-template-rows:auto minmax(0,1fr)}
  .deck-summary-topline{grid-template-columns:1fr}
  .deck-summary-trend-head{align-items:flex-start;flex-direction:column}
  .summary-week-head,.summary-week-row{grid-template-columns:72px minmax(0,1fr) 68px 76px}
  .card-summary-media{justify-self:start}
  .sidebar{position:fixed;z-index:20}
  .main{
    height:auto;
    overflow-x:hidden;
    overflow-y:visible;
    padding:74px 16px 28px;
  }
  .hero{grid-template-columns:1fr}
  .hero-period{justify-self:start;justify-content:flex-start;text-align:left;padding-top:0;white-space:normal}
  .hero-period-row{justify-content:flex-start;flex-wrap:wrap;white-space:normal}
  .page-scroller{
    overflow-x:hidden;
    overflow-y:visible;
    scroll-snap-type:none;
    padding-right:0;
  }
  .view-section{
    height:auto;
    flex-basis:auto;
    min-height:auto;
    max-height:none;
    overflow-x:hidden;
    overflow-y:visible;
  }
  .view-shell{height:auto;min-height:auto;overflow-x:hidden;overflow-y:visible}
  .view-head{
    padding:0;
    overflow:hidden;
    overscroll-behavior:none;
    touch-action:manipulation;
  }
  .view-stage{overflow-x:hidden;overflow-y:visible}
  .decklist-results-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .decklist-card{overflow:hidden;min-width:0}
  .decklist-image{
    aspect-ratio:auto;
    height:auto;
    max-height:none;
    justify-content:flex-start;
    min-width:0;
  }
  .decklist-image img{
    width:100%;
    height:auto;
    max-width:100%;
    object-fit:contain;
    object-position:center top;
  }
  .decklist-footer{flex-wrap:wrap}
  .copy-btn{margin-left:0}
  .tier-group{grid-template-columns:1fr;gap:8px}
  .tier-group-meta{padding-top:0}
  .tier-group-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .card-condition-row{grid-template-columns:minmax(0,1fr) 1fr 1fr 72px}
}
@media (max-width:720px){
  html,body,.app,.main{
    width:100%;
    max-width:100vw;
    overflow-x:clip;
  }
  .sidebar .section-link-list{
    max-height:none;
    overflow:hidden;
  }
  .sidebar .section-link-list .side-link{
    overflow:hidden;
    overscroll-behavior:none;
  }
  .view-head,.view-head .title-line,.view-title{
    max-height:none;
    overflow:hidden;
    overscroll-behavior:none;
    touch-action:manipulation;
  }
  .main{padding-left:12px;padding-right:12px}
  .hero,.page-scroller,.view-section,.view-shell,.view-head,.view-stage,.panel,.panel-scroll,.grid,.table-wrap,.tier-group,.tier-group-grid,.tier-stack-card,.tier-stack-link,.tier-stack-top,.tier-stack-stats{
    min-width:0;
    max-width:100%;
    overflow-x:hidden;
  }
  .table-wrap{padding-right:0}
  .table{
    width:100%;
    max-width:100%;
    table-layout:fixed;
  }
  .table th,.table td{
    white-space:normal;
    overflow-wrap:anywhere;
    word-break:break-word;
  }
  .table-tier th:nth-child(1),.table-tier td:nth-child(1){width:46px}
  .table-tier th:nth-child(3),.table-tier td:nth-child(3),
  .table-tier th:nth-child(4),.table-tier td:nth-child(4),
  .table-tier th:nth-child(5),.table-tier td:nth-child(5){width:auto}
  .tier-stack-stats{gap:3px}
  .tier-stat{padding:4px 3px}
  .tier-stat-main{gap:3px}
  .tier-stat-icon{width:14px;height:14px}
  .tier-stat-icon svg{width:9px;height:9px}
  .tier-stat-value{font-size:11px;letter-spacing:0}
  .decklist-results-grid{grid-template-columns:1fr}
  .event-detail-content .decklist-results-grid{grid-template-columns:1fr}
  .tier-group-grid{grid-template-columns:1fr}
  .tier-stack-link{min-height:108px;padding:8px}
  .tier-stack-top{grid-template-columns:118px minmax(0,1fr);gap:8px}
  .card-condition-row{grid-template-columns:1fr 1fr}
}
</style>
</head>

function weekKeyForDate(value){
  const match = String(value || "").match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (!match) return "";
  const dt = new Date(Date.UTC(Number(match[1]), Number(match[2]) - 1, Number(match[3])));
  if (Number.isNaN(dt.getTime())) return "";
  const daysSinceSaturday = (dt.getUTCDay() + 1) % 7;
  dt.setUTCDate(dt.getUTCDate() - daysSinceSaturday);
  return dt.toISOString().slice(0, 10);
}

function aggregateDeckStatsForRows(rows){
  const map = {};
  let totalTop4 = 0;
  let totalWins = 0;
  rows.forEach(row => {
    const name = String(row.deck_name || "").trim() || "その他";
    if (!map[name]) map[name] = {name, count:0, top4:0, wins:0};
    map[name].count += 1;
    if (Number(row.placing || 999) <= 4){
      map[name].top4 += 1;
      totalTop4 += 1;
    }
    if (Number(row.placing || 999) === 1){
      map[name].wins += 1;
      totalWins += 1;
    }
  });
  return Object.values(map)
    .map(item => ({
      ...item,
      usage: rows.length ? item.count / rows.length * 100 : 0,
      b4: totalTop4 ? item.top4 / totalTop4 * 100 : 0,
      win: totalWins ? item.wins / totalWins * 100 : 0,
      top4_rate: item.count ? item.top4 / item.count * 100 : 0,
      win_rate: item.count ? item.wins / item.count * 100 : 0,
    }))
    .sort((a, b) => b.usage - a.usage || b.wins - a.wins || b.top4 - a.top4 || a.name.localeCompare(b.name, "ja"));
}

function tierThresholds(){
  const source = Array.isArray(DATA.tier_thresholds) ? DATA.tier_thresholds : [];
  const useDataThresholds = source.length === DEFAULT_TIER_THRESHOLDS.length
    && source.every(item => Object.prototype.hasOwnProperty.call(item || {}, "max_usage"));
  const raw = useDataThresholds ? source : DEFAULT_TIER_THRESHOLDS;
  return raw
    .map((item, index) => ({
      tier: String(item?.tier ?? DEFAULT_TIER_THRESHOLDS[index]?.tier ?? `Tier${index + 1}`),
      min_usage: Number(item?.min_usage ?? DEFAULT_TIER_THRESHOLDS[index]?.min_usage ?? 0),
      max_usage: item?.max_usage === null || item?.max_usage === undefined ? null : Number(item.max_usage),
      description: String(item?.description ?? DEFAULT_TIER_THRESHOLDS[index]?.description ?? ""),
    }))
    .sort((a, b) => Number(b.min_usage) - Number(a.min_usage));

function tiersFromUsage(stats){
  const thresholds = tierThresholds();
  const buckets = thresholds.map(item => ({tier:item.tier, description:item.description || "", items:[]}));
  stats.forEach(stat => {
    const usage = Number(stat.usage || 0);
    for (let index = 0; index < thresholds.length; index += 1){
      const threshold = thresholds[index];
      const maxUsage = threshold.max_usage === null ? Infinity : Number(threshold.max_usage || 0);
      if (usage >= Number(threshold.min_usage || 0) && usage < maxUsage){
        buckets[index].items.push(stat);

    }
  });

function placeTrendTipAtNode(tip, wrap, svg, node){
  if (!tip || !wrap || !svg || !node) return;
  const viewBox = String(svg.getAttribute("viewBox") || "").trim().split(/\s+/).map(Number);
  const vbWidth = Number(viewBox[2] || svg.clientWidth || wrap.clientWidth || 1);
  const vbHeight = Number(viewBox[3] || svg.clientHeight || wrap.clientHeight || 1);
  const cx = Number(node.getAttribute("cx") || 0);
  const cy = Number(node.getAttribute("cy") || 0);
  const rect = wrap.getBoundingClientRect();
  const pointX = vbWidth ? (cx / vbWidth) * rect.width : rect.width / 2;
  const pointY = vbHeight ? (cy / vbHeight) * rect.height : rect.height / 2;
  const tipWidth = Number(tip.offsetWidth || 168);
  const tipHeight = Number(tip.offsetHeight || 52);
  let left = pointX + 12;
  let top = pointY - tipHeight - 12;
  if (left + tipWidth > rect.width - 8) left = pointX - tipWidth - 12;
  if (left < 8) left = 8;
  if (top < 8) top = Math.min(rect.height - tipHeight - 8, pointY + 12);
  if (top < 8) top = 8;
  tip.style.left = `${Math.round(left)}px`;
  tip.style.top = `${Math.round(top)}px`;
}

function meowToneText(raw){
  let text = String(raw || "");
  if (!text.trim()) return text;
  const leading = text.match(/^\s*/)?.[0] || "";
  const trailing = text.match(/\s*$/)?.[0] || "";
  let core = text.trim();
  const exact = new Map([
    ["説明", "説明だニャ"],
    ["検索する", "探すニャ"],
    ["初期表示に戻す", "最初に戻すニャ"],
    ["ページ先頭", "ページ先頭"],
    ["該当なし", "該当なしニャ"],
    ["表示", "表示ニャ"],
    ["選択", "選ぶニャ"],
    ["検索", "探すニャ"],
    ["集計", "集計ニャ"],
    ["推移", "推移ニャ"],
  ]);
  if (exact.has(core)) return leading + exact.get(core) + trailing;
  core = core
    .replace(/固定分析を軽量な週次集計データで再計算する4ページ版です。/g, "固定分析を軽い週次データで再計算する4ページ版だニャ。")
    .replace(/期間を切り替えても、4ページすべて同じ集計条件で再計算されます。/g, "期間を切り替えても、4ページまとめて同じ条件で再計算するニャ。")
    .replace(/表示できる([^。]+?)がありません。/g, "表示できる$1がないニャ。")
    .replace(/前週比で上昇した([^。]+?)はありません。/g, "前週比で上昇した$1はないニャ。")
    .replace(/前週比で下降した([^。]+?)はありません。/g, "前週比で下降した$1はないニャ。")
    .replace(/条件に合うデッキリストがありません/g, "条件に合うデッキリストはないニャ")
    .replace(/してください/g, "してくれニャ")
    .replace(/見ます/g, "見るニャ")
    .replace(/付きます/g, "付くニャ")
    .replace(/伸びます/g, "伸びるニャ")
    .replace(/下げます/g, "下げるニャ")
    .replace(/戻ります/g, "戻るニャ")
    .replace(/続きます/g, "続くニャ")
    .replace(/変わります/g, "変わるニャ")
    .replace(/なります/g, "なるニャ")
    .replace(/できます/g, "できるニャ")
    .replace(/ありません/g, "ないニャ")
    .replace(/います/g, "いるニャ")
    .replace(/します/g, "するニャ")
    .replace(/されます/g, "されるニャ")
    .replace(/です/g, "だニャ")
    .replace(/ます/g, "ニャ");
  return leading + core + trailing;
}
function applyMeowTone(root=document.body){
  if (!root) return;
  const skipSelector = [
    "script",
    "style",
    "svg",
    "input",
    "select",
    "option",
    "textarea",
    "datalist",
    ".label-text",
    ".entity-link",
    ".trend-label",
    ".arch-breakdown-name",
    ".decklist-code",
    ".copy-code",
    "[data-deck-code]",
    ".jump-link",
  ].join(",");
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
    acceptNode(node){
      const parent = node.parentElement;
      if (!parent || parent.closest(skipSelector)) return NodeFilter.FILTER_REJECT;
      if (!node.nodeValue || !node.nodeValue.trim()) return NodeFilter.FILTER_REJECT;
      return NodeFilter.FILTER_ACCEPT;
    }
  });
  const nodes = [];
  while (walker.nextNode()) nodes.push(walker.currentNode);
  nodes.forEach(node => { node.nodeValue = meowToneText(node.nodeValue); });
  qsa("[aria-label], [title]").forEach(el => {
    if (el.closest(skipSelector)) return;
    if (el.hasAttribute("aria-label")) el.setAttribute("aria-label", meowToneText(el.getAttribute("aria-label")));
    if (el.hasAttribute("title")) el.setAttribute("title", meowToneText(el.getAttribute("title")));
  });
}

  if (tone === "top4"){

    return `background:rgba(255,209,102,${fill});border-color:rgba(255,209,102,${border});`;
  }
  if (tone === "win"){
    const fill = (0.08 + ratio * 0.28).toFixed(3);
    const border = (0.16 + ratio * 0.22).toFixed(3);

function bindSectionNavigation(options={}){
  const preserveScroll = !!options.preserveScroll;
  qsa("[data-section-link]").forEach(link => {
    if (link.dataset.bound === "1") return;
    link.dataset.bound = "1";
    link.addEventListener("click", event => {
      const target = qs(`#${link.dataset.sectionLink}`);
      if (!target) return;
      event.preventDefault();
      target.scrollIntoView({behavior:"smooth", block:"start"});
      history.replaceState({}, "", `${location.pathname}${location.search}#${link.dataset.sectionLink}`);
      activateSectionLink(link.dataset.sectionLink);
      if (window.innerWidth <= 1100) closeSidebar();
    });
  });
  qsa(".jump-link").forEach(link => {
    if (link.dataset.bound === "1") return;
    link.dataset.bound = "1";
    link.addEventListener("click", event => {
      event.preventDefault();
      const pageBody = qs("#pageBody");
      if (pageBody) pageBody.scrollTo({top:0, left:0, behavior:"smooth"});
      else window.scrollTo({top:0, left:0, behavior:"smooth"});
      history.replaceState({}, "", `${location.pathname}${location.search}`);
      const firstSection = qsa(".view-section")[0];
      if (firstSection) activateSectionLink(firstSection.id);
    });
  });
  if (sectionObserver) sectionObserver.disconnect();
  const root = qs("#pageBody");
  const sections = qsa(".view-section");
  if (!root || !sections.length) return;
  sectionObserver = new IntersectionObserver(entries => {
    const visible = entries
      .filter(entry => entry.isIntersecting)
      .sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];
    if (visible) activateSectionLink(visible.target.id);
  }, {root, threshold:[0.45, 0.66, 0.9]});
  sections.forEach(section => sectionObserver.observe(section));
  const initialHash = normalizedSectionHash();
  const initialTarget = initialHash ? qs(`#${initialHash}`) : sections[0];
  if (initialTarget){
    if (!preserveScroll){
      requestAnimationFrame(() => initialTarget.scrollIntoView({block:"start"}));
    }
    activateSectionLink(initialTarget.id);
  }
}

function weekSeriesArchetypeDeckShareFromDecklists(archetypeName, deckName, rankFilter="all"){
  const rows = analysisDecklistRows();
  if (!rows.length) return null;
  return weekKeys().map(week => {
    const weekRows = rowsForAnalysis([week], rankFilter).filter(row => row.archetype === archetypeName && !strictOther(row.deck_name));
    const deckCount = weekRows.filter(row => row.deck_name === deckName).length;
    return {
      week,
      label: DATA.week_labels[week],
      stable: !!weekEntry(week).totals.stable,
      share: weekRows.length ? deckCount / weekRows.length * 100 : 0,
    };
  });
}
function weekSeriesArchetypeDeckShare(archetypeName, deckName, rankFilter="all"){
  const decklistRows = weekSeriesArchetypeDeckShareFromDecklists(archetypeName, deckName, rankFilter);
  if (decklistRows) return decklistRows;
  return weekKeys().map(week => {
    const entry = weekEntry(week);
    const archetypeRaw = entry.archetypes[archetypeName] || [0, 0, 0];
    const deckRaw = entry.decks[deckName] || [0, 0, 0, ""];
    const archetypeCount = Number(archetypeRaw[0] || 0);
    const deckCount = deckRaw[3] === archetypeName ? Number(deckRaw[0] || 0) : 0;
    return {
      week,
      label: DATA.week_labels[week],
      stable: !!entry.totals.stable,
      share: archetypeCount ? deckCount / archetypeCount * 100 : 0,
    };
  });
}
function archetypeBreakdownRows(name, weeks=currentWeeks(), rankFilter="all"){
  return breakdownWithinArchetype(name, weeks, rankFilter).map(item => ({
    ...item,
    delta: adjacentWeekDelta(weekSeriesArchetypeDeckShare(name, item.name, rankFilter), "share"),
  }));
}

      "",
      "デッキ要約",
      "アーキタイプとデッキ名を選び、Tier・使用率・直近変化・上位進出率と週次推移を確認できます。",
      `
        <div class="deck-summary-toolbar card-summary-toolbar">
          <div class="field-grid two">
            <div class="field">
              <label class="field-label">アーキタイプ</label>
              <select id="deckSummaryArchetype">
                ${archetypeOptions.map(name => `<option value="${escapeHtml(name)}" ${name === selectedArchetype ? "selected" : ""}>${escapeHtml(name)}</option>`).join("")}
              </select>
            </div>
            <div class="field">
              <label class="field-label">デッキ名</label>
              <select id="deckSummaryDeck">
                ${deckOptions.map(name => `<option value="${escapeHtml(name)}" ${name === activeDeckName ? "selected" : ""}>${escapeHtml(name)}</option>`).join("")}
              </select>
            </div>
          </div>
        </div>
        <div class="panel panel-scroll deck-summary-panel">
          <div class="deck-summary-hero-layout">
            <div class="deck-summary-left">
              <div class="deck-summary-tier-card">
                <div class="deck-summary-tier-label">Tier</div>
                <div class="deck-summary-tier-value">${escapeHtml(tierLabel)}</div>
              </div>
              ${deckSummaryMediaHtml(activeDeckName)}
            </div>
            <div class="card-summary-right">
              <div class="deck-summary-topline">
                <div class="deck-summary-metric-card usage">
                  <div class="deck-summary-metric-main">
                    <span class="tier-stat-icon usage">${metricIconSvg("usage")}</span>
                    <div class="deck-summary-metric-value-row">
                      <div class="deck-summary-metric-value">${fmtPct(deck.usage)}</div>
                      ${tooltipIcon("集計期間内の全デッキに対する使用比率です。", "left")}
                    </div>
                  </div>
                </div>
                <div class="deck-summary-metric-card top4">
                  <div class="deck-summary-metric-main">
                    <span class="tier-stat-icon top4">${metricIconSvg("top4")}</span>
                    <div class="deck-summary-metric-value-row">
                      <div class="deck-summary-metric-value">${fmtPct(deck.top4_rate)}</div>
                      ${tooltipIcon("そのデッキの出場数に対して、TOP4に入った比率です。", "left")}
                    </div>
                  </div>
                  <div class="deck-summary-metric-sub top4">TOP4シェア率 ${fmtPct(deck.b4)}</div>
                </div>
                <div class="deck-summary-metric-card win">
                  <div class="deck-summary-metric-main">
                    <span class="tier-stat-icon win">${metricIconSvg("win")}</span>
                    <div class="deck-summary-metric-value-row">
                      <div class="deck-summary-metric-value">${fmtPct(deck.win_rate)}</div>
                      ${tooltipIcon("そのデッキの出場数に対して優勝した比率です。試合単位の勝率ではありません。", "left")}
                    </div>
                  </div>
                  <div class="deck-summary-metric-sub win">優勝シェア率 ${fmtPct(deck.win)}</div>
                </div>
              </div>
              <div class="card-summary-trend-box deck-summary-trend-box-panel">
                <div class="deck-summary-trend-head">
                  <div class="deck-summary-trend-head-main">
                    <div class="deck-summary-trend-title">週次推移</div>
                    ${tooltipIcon("使用率・TOP4シェア率・優勝シェア率を週ごとに表示します。プロットにカーソルを合わせると数値を表示します。参考週には * が付きます。", "left")}
                  </div>
                  <div class="deck-summary-delta-note">使用率の直近変化 ${fmtSigned(recentDelta)}</div>
                </div>
                <div class="svg-wrap">
                  <svg id="deckTrend" viewBox="0 0 760 260" width="100%" height="100%"></svg>
                </div>
              </div>
            </div>
          </div>
        </div>
      `
    ),
    screenSection(
      "deck-cards",
      "",
      "採用カード",
      "そのデッキでよく使われるカードと平均採用枚数を確認します。",
      tablePanel(`${renderName(activeDeckName)} の採用カード TOP20`, "", `<table class="table"><thead><tr><th>#</th><th>カード</th><th>採用率</th><th>平均枚数</th></tr></thead><tbody>${cards.map((item, index) => `<tr><td>${index + 1}</td><td>${renderLinked("card", item.name)}</td><td>${fmtPct(item.rate)}</td><td>${item.avgCopies.toFixed(2)}</td></tr>`).join("")}</tbody></table>`)
    ),
  ];
  qs("#pageBody").innerHTML = sections.join("");
  const deckCardsHead = qs("#deck-cards > .view-shell > .view-stage > .panel > .panel-head");
  if (deckCardsHead) deckCardsHead.remove();
  const deckCardsWrap = qs("#deck-cards .table-wrap");
  if (deckCardsWrap){
    deckCardsWrap.classList.add("deck-cards-wrap");
    deckCardsWrap.innerHTML = `${rankFilterControls("deckCards", deckCardsRankFilter)}${deckCardsPanelsHtml}`;
  }
  qs("#deckSummaryArchetype")?.addEventListener("change", event => {
    const nextArchetype = String(event.currentTarget.value || "").trim();
    const nextDeck = decks.find(item => item.archetype === nextArchetype)?.name || names[0] || "";
    if (nextDeck) setSelection("deck", nextDeck);
  });
  qs("#deckSummaryDeck")?.addEventListener("change", event => {
    const nextDeck = String(event.currentTarget.value || "").trim();
    if (nextDeck) setSelection("deck", nextDeck);
  });
  bindRankFilterControls();
  drawMultiLine("deckTrend", trendLines, "value");
}
function renderDecklists(){
  const state = decklistSearchState();
  decklistDraftState = state;
  const rows = filteredDecklistRows(state);
  qs("#pageTitle").textContent = PAGE_TITLES.decklists;
  qs("#breadcrumbs").innerHTML = `<a href="${pageFile("decklists")}">デッキリスト検索</a>`;
  const content = rows.length
    ? `<div class="decklist-results-grid">${rows.map(decklistResultCard).join("")}</div>`
    : `
      <div class="empty-state">
        <div class="empty-title">条件に合うデッキリストがありません</div>
        <div class="empty-desc">アーキタイプ、開催日、順位、採用カード条件を見直すか、条件をリセットしてもう一度検索してください。データ接続前でも壊れないように空状態を表示しています。</div>
      </div>`;
  const sections = [
    screenSection(
      "decklist-results",
      "",
      `検索結果<span class="decklist-results-count-inline">${rows.length}件</span>`,
      "デッキ画像・デッキ名・大会順位・開催日・デッキコードを一覧表示します。",
      `
        <div class="panel panel-scroll">
          <div class="table-wrap">${content}</div>
        </div>`
    ),
  ];
  qs("#pageBody").innerHTML = sections.join("");
  bindDecklistResultActions();
}
function renderCards(){
  const allCardNames = [...new Set((DATA.meta_card_names || []).concat(Object.keys(currentWeeks().reduce((acc, week) => Object.assign(acc, weekEntry(week).cards || {}), {}))))];
  const cards = aggregateCardStats(currentWeeks(), allCardNames);
  const names = cards.map(item => item.name);
  const selected = currentSelection("card", names);
  const summary = cards.find(item => item.name === selected) || {rate:0, decks:0, avgCopiesWhenUsed:0};
  const cardUsageRankFilter = rankFilterState("cardUsage");
  const deckRows = decksUsingCard(selected, currentWeeks(), cardUsageRankFilter).map((item, index) => ({...item, rank:index + 1}));
  const sortedDeckRows = sortedCardUsageRows(deckRows);
  const series = weekSeriesCard(selected);
  const recentDelta = adjacentWeekDelta(series, "rate");
  const selectedCardImage = cardImageSrcByName(selected);
  qs("#pageTitle").textContent = PAGE_TITLES.cards;
  qs("#breadcrumbs").innerHTML = `<a href="${pageFile("index")}">環境全体</a><span class="sep">/</span><a href="${pageFile("cards")}">カード分析</a><span class="sep">/</span><span>${renderName(selected)}</span>`;
  const sections = [
    screenSection(
      "card-summary",
      "",
      "カード選択",
      "カードを選んで、採用率・平均枚数・直近変化と週別採用率を確認できます。",
      `
        <div class="card-summary-toolbar">
          <div class="field">
            <input type="text" id="cardSelectInput" class="search" list="cardSelectOptions" value="${escapeHtml(selected)}" placeholder="カード名を入力" autocomplete="off" aria-label="カード名">
            <datalist id="cardSelectOptions">${names.map(name => `<option value="${escapeHtml(name)}"></option>`).join("")}</datalist>
          </div>
        </div>
        <div class="panel panel-scroll">
          <div class="card-summary-hero">
            <div class="card-summary-media">
              <img src="${escapeHtml(selectedCardImage)}" alt="${escapeHtml(selected)}" loading="lazy">
            </div>
            <div class="card-summary-right">
              <div class="card-summary-metrics">
                <div class="card-summary-stat">
                  <div class="card-summary-stat-label">採用率</div>
                  <div class="card-summary-stat-value">${fmtPct(summary.rate)}</div>
                </div>
                <div class="card-summary-stat">
                  <div class="card-summary-stat-label">直近変化</div>
                  <div class="card-summary-stat-value">${fmtSigned(recentDelta)}</div>
                </div>
                <div class="card-summary-stat">
                  <div class="card-summary-stat-label">平均枚数</div>
                  <div class="card-summary-stat-value">${(summary.avgCopiesWhenUsed || 0).toFixed(2)}</div>
                </div>
              </div>
              <div class="card-summary-trend-box">
                <div class="card-summary-trend-head">
                  <div class="card-summary-trend-title">週別採用率</div>
                  ${tooltipIcon("プロットにカーソルを合わせると、その週の採用率を表示します。参考週には * が付きます。", "left")}
                </div>
                <div class="svg-wrap">
                  <svg id="cardTrend" viewBox="0 0 760 260" width="100%" height="100%"></svg>
                </div>
              </div>
            </div>
          </div>
        </div>
      `
    ),
    screenSection(
      "card-usage",
      "",
      "採用先分析",
      "どのデッキで使われているかを詳しく確認します。",
      `
        ${rankFilterControls("cardUsage", cardUsageRankFilter)}
        ${tablePanel("", "", `<table class="table"><thead><tr><th>${cardUsageSortHead("#", "rank")}</th><th>${cardUsageSortHead("デッキ", "name")}</th><th>${cardUsageSortHead("構成比", "cardRate", "構成比は、このカードを採用した全デッキのうち各デッキが占める比率です。")}</th><th>${cardUsageSortHead("採用率", "adoptionRate")}</th><th>${cardUsageSortHead("直近変化", "recentDelta")}</th><th>${cardUsageSortHead("平均枚数", "avgCopies")}</th><th>${cardUsageSortHead("平均枚数変化", "avgCopiesDelta")}</th></tr></thead><tbody>${sortedDeckRows.length ? sortedDeckRows.map(item => `<tr><td>${item.rank}</td><td>${renderLinked("deck", item.name)}</td><td>${fmtPct(item.cardRate)}</td><td>${fmtPct(item.adoptionRate)}</td><td>${fmtSigned(item.recentDelta)}</td><td>${item.avgCopies.toFixed(2)}</td><td>${fmtSigned(item.avgCopiesDelta)}</td></tr>`).join("") : `<tr><td colspan="7" class="muted">該当なし</td></tr>`}</tbody></table>`)}
      `
    ),
  ];
  qs("#pageBody").innerHTML = sections.join("");
  const cardSelectInput = qs("#cardSelectInput");
  const applyCardSelection = value => {
    const next = String(value || "").trim();
    if (!next || !names.includes(next)) return false;
    if (next === selected) return true;
    setSelection("card", next);
    return true;
  };
  const syncCardSelection = () => {
    if (!cardSelectInput) return;
    if (!applyCardSelection(cardSelectInput.value)) cardSelectInput.value = selected;
  };
  cardSelectInput?.addEventListener("input", event => {
    const next = String(event.currentTarget.value || "").trim();
    if (next && names.includes(next) && next !== selected) setSelection("card", next);
  });
  cardSelectInput?.addEventListener("change", syncCardSelection);
  cardSelectInput?.addEventListener("blur", syncCardSelection);
  cardSelectInput?.addEventListener("keydown", event => {
    if (event.key !== "Enter") return;
    event.preventDefault();
    syncCardSelection();
  });
  bindCardUsageSortControls();
  bindRankFilterControls();
  drawLine("cardTrend", series, "rate", "#7cc7ff", selected);
}
function renderPage(options={}){
  const preserveScroll = !!options.preserveScroll;
  const pageBody = qs("#pageBody");
  const scrollState = preserveScroll && pageBody
    ? {top: pageBody.scrollTop}
    : null;
  updatePeriodVisuals();
  if (PAGE !== "champions") qs("#pageFixedControls").innerHTML = "";
  if (PAGE === "index") renderIndexV2();
  if (PAGE === "champions") renderChampions();
  if (PAGE === "archetypes") renderArchetypes();
  if (PAGE === "decks") renderDecks();
  if (PAGE === "cards") renderCards();
  if (PAGE === "decklists") renderDecklists();
  applyMeowTone(document.body);
  bindSectionNavigation({preserveScroll});
  requestAnimationFrame(clampHorizontalLayout);
  requestAnimationFrame(bindStaticHeaderTouchGuards);
  requestAnimationFrame(bindTooltipTapOverlays);
  if (scrollState){
    requestAnimationFrame(() => {
      const nextPageBody = qs("#pageBody");
      if (!nextPageBody) return;
      nextPageBody.scrollTop = scrollState.top;
      nextPageBody.scrollLeft = 0;
    });
  }
}
window.addEventListener("hashchange", () => {
  const target = qs(`#${normalizedSectionHash()}`);
  if (target) target.scrollIntoView({behavior:"smooth", block:"start"});
});
document.addEventListener("DOMContentLoaded", () => {
  migrateLegacyHash();
  initShell();
  setSidebarOpen(isDesktop());
  syncSidebarMode();
  renderPage();
});
</script>
</body>
</html>
