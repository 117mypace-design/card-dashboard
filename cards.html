<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ポケモンカード メタレポート 2026-05-15 | カード分析</title>
  <style>
:root{
  --bg:#09111f;
  --panel:#101a31;
  --panel2:#172443;
  --text:#edf3ff;
  --muted:#aab7d3;
  --line:#2a3a67;
  --accent:#7cc7ff;
  --accent2:#8cf0b2;
  --accent3:#ffd166;
  --accent4:#ff9db2;
  --good:#74e4a7;
  --warn:#ffd166;
  --bad:#ff9a90;
}
*{box-sizing:border-box}
html{
  scroll-behavior:smooth;
  width:100%;
  max-width:100%;
  overflow-x:hidden;
  overscroll-behavior-x:none;
}
body{
  margin:0;
  width:100%;
  max-width:100%;
  overflow-x:hidden;
  overscroll-behavior-x:none;
  touch-action:pan-y;
  color:var(--text);
  font-family:"BIZ UDPGothic","Yu Gothic UI","Yu Gothic","Meiryo",sans-serif;
  background:
    radial-gradient(circle at top right, rgba(124,199,255,.10), transparent 28%),
    radial-gradient(circle at top left, rgba(140,240,178,.07), transparent 24%),
    linear-gradient(180deg,#08101d 0%,#09111f 100%);
}
a{color:inherit;text-decoration:none}
.app{display:flex;min-height:100vh;width:100%;max-width:100%;overflow-x:hidden;overscroll-behavior-x:none}
.backdrop{display:none}
.backdrop.show{display:block;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:19}
.sidebar{
  width:300px;
  background:rgba(8,14,28,.92);
  border-right:1px solid var(--line);
  padding:18px;
  position:sticky;
  top:0;
  height:100vh;
  overflow-y:auto;
  overflow-x:hidden;
  backdrop-filter:blur(14px);
}
.sidebar.hidden{transform:translateX(-100%);position:fixed;z-index:20;pointer-events:none}
.sidebar h2{margin:0 0 8px;font-size:18px}
.subtle{font-size:12px;color:var(--muted);line-height:1.65}
.side-accordion{
  margin:16px 0;
  border:1px solid var(--line);
  border-radius:16px;
  background:rgba(255,255,255,.03);
  overflow:hidden;
}
.side-accordion summary{
  list-style:none;
  cursor:pointer;
  padding:13px 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  font-size:13px;
  font-weight:700;
}
.side-accordion summary::-webkit-details-marker{display:none}
.side-accordion summary::after{
  content:"+";
  color:var(--muted);
  font-size:16px;
  line-height:1;
}
.side-accordion[open] summary::after{content:"-"}
.side-accordion-body{padding:0 10px 12px}
.side-link{
  display:block;
  padding:8px 10px;
  border-radius:12px;
  color:var(--text);
  font-size:14px;
}
.side-link.active,.side-link:hover{background:rgba(124,199,255,.12)}
.toggle{
  position:fixed;
  left:16px;
  top:16px;
  z-index:25;
  background:#121d37;
  color:var(--text);
  border:1px solid var(--line);
  border-radius:12px;
  padding:10px 12px;
  cursor:pointer;
}
.main{
  flex:1;
  width:100%;
  max-width:100%;
  min-width:0;
  height:100vh;
  overflow:hidden;
  padding:10px 16px 12px;
  display:flex;
  flex-direction:column;
  overscroll-behavior-x:none;
}
.hero,.page-scroller,.view-section,.view-shell,.view-head,.view-stage,.panel,.grid,.tier-group,.tier-group-grid,.tier-stack-card,.tier-stack-link,.tier-stack-top,.tier-stack-stats,.table-wrap{
  max-width:100%;
}
.hero{
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  align-items:start;
  gap:10px;
  margin-bottom:6px;
}
.hero-main{min-width:0}
.hero-period{
  justify-self:end;
  text-align:right;
  color:var(--muted);
  font-size:13px;
  line-height:1.45;
  padding-top:0;
  white-space:nowrap;
}
.section-kicker{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-weight:700}
h1{font-size:27px;line-height:1.05;margin:0 0 2px}
.sub{color:var(--muted);font-size:14px;line-height:1.6}
.breadcrumbs{display:flex;gap:8px;flex-wrap:wrap;font-size:13px;color:var(--muted);margin:4px 0 8px}
.sep{opacity:.5}
.page-scroller{
  flex:1;
  min-height:0;
  overflow-y:auto;
  overflow-x:hidden;
  display:flex;
  flex-direction:column;
  gap:12px;
  padding-right:6px;
  scroll-snap-type:y mandatory;
}
.view-section{
  flex:0 0 100%;
  height:100%;
  min-height:100%;
  max-height:100%;
  min-width:0;
  overflow:hidden;
  scroll-snap-align:start;
  scroll-snap-stop:always;
}
.view-shell{
  height:100%;
  min-height:0;
  min-width:0;
  display:flex;
  flex-direction:column;
  gap:10px;
  overflow:hidden;
}
.view-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
  padding:2px 2px 0;
}
.view-title{
  font-size:20px;
  line-height:1.1;
  font-weight:800;
}
.title-line,
.panel-head,
.metric-head{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}
.view-stage{
  flex:1;
  min-height:0;
  display:flex;
  flex-direction:column;
  gap:10px;
  overflow-y:auto;
  overflow-x:hidden;
  padding-right:2px;
}
.jump-link{
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding:6px 10px;
  border:1px solid var(--line);
  border-radius:999px;
  background:rgba(255,255,255,.03);
  color:var(--muted);
  font-size:11px;
  white-space:nowrap;
}
.panel{
  background:linear-gradient(180deg,rgba(16,26,49,.98),rgba(23,36,67,.94));
  border:1px solid var(--line);
  border-radius:18px;
  padding:10px;
  box-shadow:0 8px 24px rgba(0,0,0,.24);
  min-width:0;
}
.panel-scroll{
  height:100%;
  min-height:0;
  display:flex;
  flex-direction:column;
}
.deck-summary-panel{
  overflow:hidden;
}
.aux-detail{
  margin-top:16px;
  border:1px solid rgba(255,255,255,.08);
  border-radius:18px;
  background:rgba(255,255,255,.025);
  overflow:hidden;
}
.aux-detail summary{
  list-style:none;
  cursor:pointer;
  padding:12px 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  font-size:13px;
  font-weight:700;
}
.aux-detail summary::-webkit-details-marker{display:none}
.aux-detail summary::after{
  content:"+";
  color:var(--muted);
  font-size:16px;
  line-height:1;
}
.aux-detail[open] summary::after{content:"-"}
.aux-detail-body{
  padding:0 14px 14px;
}
.section-title{font-size:17px;font-weight:700;margin:0 0 10px}
.section-sub{font-size:12px;color:var(--muted);margin:-4px 0 12px;line-height:1.6}
.panel-head .section-title,
.metric-head .label{margin:0}
.tooltip-wrap{
  position:relative;
  display:inline-flex;
  align-items:center;
  flex:0 0 auto;
}
.help-tip{
  width:22px;
  height:22px;
  border-radius:999px;
  border:1px solid rgba(124,199,255,.32);
  background:rgba(124,199,255,.08);
  color:var(--accent);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  font-weight:700;
  cursor:help;
  padding:0;
}
.help-tip:hover,
.help-tip:focus-visible{
  outline:none;
  border-color:rgba(124,199,255,.55);
  background:rgba(124,199,255,.16);
}
.tooltip-bubble{
  position:absolute;
  top:calc(100% + 10px);
  left:50%;
  transform:translateX(-50%) translateY(-4px);
  width:clamp(220px, 28vw, 320px);
  min-width:220px;
  max-width:calc(100vw - 48px);
  padding:10px 12px;
  border-radius:14px;
  border:1px solid rgba(124,199,255,.22);
  background:rgba(12,20,38,.97);
  color:var(--text);
  font-size:12px;
  line-height:1.65;
  white-space:normal;
  word-break:normal;
  overflow-wrap:anywhere;
  box-shadow:0 18px 36px rgba(0,0,0,.32);
  opacity:0;
  visibility:hidden;
  pointer-events:none;
  transition:opacity .16s ease, transform .16s ease, visibility .16s ease;
  z-index:40;
}
.tooltip-wrap.align-left .tooltip-bubble{
  left:0;
  transform:translateX(0) translateY(-4px);
}
.tooltip-wrap.align-right .tooltip-bubble{
  left:auto;
  right:0;
  transform:translateX(0) translateY(-4px);
}
.tooltip-wrap:hover .tooltip-bubble,
.tooltip-wrap:focus-within .tooltip-bubble{
  opacity:1;
  visibility:visible;
}
.tooltip-wrap:hover .tooltip-bubble{
  transform:translateX(-50%) translateY(0);
}
.tooltip-wrap.align-left:hover .tooltip-bubble,
.tooltip-wrap.align-left:focus-within .tooltip-bubble,
.tooltip-wrap.align-right:hover .tooltip-bubble,
.tooltip-wrap.align-right:focus-within .tooltip-bubble{
  transform:translateX(0) translateY(0);
}
.grid{display:grid;gap:16px}
.grid.two{grid-template-columns:1fr 1fr}
.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}
.grid.four{grid-template-columns:repeat(4,minmax(0,1fr))}
.fill-grid{align-items:stretch}
.fill-grid > *{min-height:0}
.hero-stage{display:grid;grid-template-columns:1.15fr .85fr;gap:16px}
.season-summary-grid{display:grid;grid-template-columns:1.12fr .88fr;gap:16px}
.spotlight{
  padding:20px;
  border-radius:20px;
  border:1px solid rgba(124,199,255,.20);
  background:
    radial-gradient(circle at top right, rgba(124,199,255,.18), transparent 38%),
    linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01));
}
.eyebrow{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:8px}
.headline{font-size:24px;font-weight:800;line-height:1.15;margin:0 0 6px}
.card-summary-picker{display:grid;gap:14px}
.card-summary-toolbar{margin-bottom:12px}
.card-summary-toolbar .field{margin:0}
.card-summary-toolbar .search{font-size:16px;font-weight:700}
.deck-summary-toolbar .field{margin:0}
.deck-summary-hero-layout{
  display:grid;
  grid-template-columns:170px minmax(0,1fr);
  gap:10px;
  align-items:stretch;
  min-height:0;
  min-width:0;
  width:100%;
  max-width:100%;
  overflow:hidden;
}
.deck-summary-left{
  display:grid;
  grid-template-rows:60px minmax(0,1fr);
  gap:6px;
  min-height:0;
  min-width:0;
  overflow:hidden;
}
.deck-summary-left .card-summary-media{
  min-height:0;
}
.deck-summary-tier-card{
  display:grid;
  align-content:center;
  gap:4px;
  padding:10px 12px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.03);
  min-height:60px;
}
.deck-summary-tier-label{
  font-size:11px;
  color:var(--muted);
  font-weight:700;
}
.deck-summary-tier-value{
  font-size:22px;
  font-weight:800;
  line-height:1.05;
}
.arch-lead-card .deck-summary-tier-value{
  font-size:17px;
  line-height:1.15;
}
.arch-lead-card .deck-summary-tier-value a{
  color:var(--text);
  text-decoration:none;
}
.deck-summary-topline{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:6px;
  min-width:0;
}
.deck-summary-metric-card{
  display:grid;
  gap:3px;
  align-content:start;
  padding:7px 10px 5px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.03);
  min-height:60px;
  min-width:0;
}
.deck-summary-metric-card.usage{
  background:rgba(124,199,255,.08);
  border-color:rgba(124,199,255,.18);
}
.deck-summary-metric-card.usage .deck-summary-metric-value{
  color:#7cc7ff;
}
.deck-summary-metric-card.top4{
  background:rgba(255,209,102,.08);
  border-color:rgba(255,209,102,.18);
}
.deck-summary-metric-card.win{
  background:rgba(140,240,178,.08);
  border-color:rgba(140,240,178,.18);
}
.deck-summary-metric-main{
  display:flex;
  align-items:center;
  gap:6px;
  min-width:0;
}
.deck-summary-metric-main .tier-stat-icon{
  width:16px;
  height:16px;
}
.deck-summary-metric-value-row{
  display:flex;
  align-items:center;
  gap:4px;
  min-width:0;
}
.deck-summary-metric-value-row .tip-trigger{
  width:18px;
  height:18px;
  font-size:11px;
}
.deck-summary-metric-value{
  font-size:20px;
  font-weight:800;
  line-height:1.05;
}
.deck-summary-metric-sub{
  font-size:11px;
  font-weight:700;
  line-height:1.1;
}
.deck-summary-metric-sub.usage{color:#7cc7ff}
.deck-summary-metric-sub.top4{color:#ffd166}
.deck-summary-metric-sub.win{color:#8cf0b2}
.deck-summary-media{
  padding:0;
  overflow:hidden;
  background:#101a31;
  height:100%;
  min-height:0;
  min-width:0;
}
.deck-summary-media.split{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:2px;
  background:rgba(255,255,255,.14);
}
.deck-summary-media img{
  max-width:100%;
  max-height:100%;
  width:auto;
  height:auto;
  display:block;
  filter:saturate(1.04) contrast(1.02) brightness(.92);
}
.deck-summary-media.split img{
  width:100%;
  height:100%;
  object-fit:contain;
  object-position:center;
}
.deck-summary-media.split img + img{
  border-left:1px solid rgba(255,255,255,.16);
}
.arch-summary-media img{
  width:100%;
  height:100%;
  object-fit:contain;
  object-position:center;
}
.deck-summary-trend-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:8px;
  min-width:0;
}
.deck-summary-trend-head-main{
  display:flex;
  align-items:center;
  gap:8px;
  min-width:0;
}
.deck-summary-trend-title{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:13px;
  font-weight:800;
}
.deck-summary-delta-note{
  font-size:11px;
  color:var(--muted);
  font-weight:700;
  white-space:nowrap;
}
.deck-summary-trend-box-panel{
  padding:4px 6px;
  overflow:hidden;
  min-width:0;
}
.deck-summary-trend-box-panel .svg-wrap{
  min-height:200px;
  height:200px;
  min-width:0;
  overflow:hidden;
  width:100%;
}
.deck-summary-trend-box-panel .svg-wrap svg{
  display:block;
  width:100%;
  height:100%;
  max-width:100%;
}
.deck-summary-fallback{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--muted);
  font-size:14px;
  font-weight:700;
  background:linear-gradient(180deg,rgba(18,29,52,.96),rgba(14,23,40,.96));
}
.card-summary-focus{
  display:grid;
  grid-template-columns:120px minmax(0,1fr);
  gap:16px;
  align-items:center;
  margin-top:4px;
}
.card-summary-media{
  width:100%;
  min-height:328px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.03);
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}
.card-summary-media img{
  width:100%;
  height:100%;
  object-fit:contain;
  object-position:center;
  display:block;
  background:transparent;
}
.card-summary-fallback{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,.02);
}
.card-summary-fallback-text{font-size:13px;color:var(--muted);font-weight:700}
.card-summary-fallback .icon-stack{display:flex;align-items:center;gap:0}
.card-summary-fallback .mini-badge{width:34px;height:34px;font-size:14px}
.card-summary-hero{
  display:grid;
  grid-template-columns:200px minmax(0,1fr);
  gap:18px;
  align-items:stretch;
  margin-top:0;
}
.card-summary-right{
  display:grid;
  grid-template-rows:auto minmax(0,1fr);
  gap:4px;
  min-height:0;
  min-width:0;
  overflow:hidden;
}
.card-summary-metrics{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:10px;
}
.card-summary-stat{
  display:grid;
  gap:4px;
  align-content:center;
  padding:12px 14px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.03);
}
.card-summary-stat-label{
  font-size:11px;
  color:var(--muted);
  font-weight:700;
}
.card-summary-stat-value{
  font-size:24px;
  font-weight:700;
  line-height:1.1;
}
.card-summary-trend-box{
  display:flex;
  flex-direction:column;
  min-height:0;
  min-width:0;
  padding:8px 10px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.03);
}
.card-summary-trend-head{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:8px;
}
.card-summary-trend-title{
  font-size:13px;
  font-weight:700;
}
.card-summary-trend-box .svg-wrap{
  flex:1;
  min-height:260px;
  height:260px;
  min-width:0;
  padding-right:0;
}
.card-summary-trend-box .svg-wrap svg{
  width:100%;
  height:100%;
  display:block;
}
.meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.stat-chip{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 10px;
  border-radius:999px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  font-size:12px;
}
.meta-strip{display:grid;gap:10px}
.summary-side-stack{display:grid;gap:10px}
.summary-glance-grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:10px;
  margin-top:12px;
}
.summary-glance-card{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.07);
  border-radius:16px;
  padding:14px;
  min-width:0;
}
.summary-glance-card .label{
  font-size:11px;
  color:var(--muted);
  font-weight:700;
  letter-spacing:.04em;
  margin-bottom:8px;
}
.summary-glance-card .value{
  font-size:18px;
  font-weight:800;
  line-height:1.2;
}
.summary-glance-card .note{
  font-size:12px;
  color:var(--muted);
  margin-top:8px;
  line-height:1.45;
}
.summary-glance-card .value a{
  color:var(--text);
  text-decoration:none;
}
.summary-week-rail{
  display:grid;
  gap:6px;
  margin-top:14px;
}
.summary-week-head,
.summary-week-row{
  display:grid;
  grid-template-columns:84px minmax(0,1fr) 76px 84px;
  gap:10px;
  align-items:center;
}
.summary-week-head{
  padding:0 10px 2px;
  color:var(--muted);
  font-size:11px;
  font-weight:700;
}
.summary-week-row{
  padding:9px 10px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.06);
  background:rgba(255,255,255,.03);
}
.summary-week-row.latest{
  border-color:rgba(124,199,255,.22);
  background:rgba(124,199,255,.08);
}
.summary-week-week{
  font-size:12px;
  font-weight:700;
  white-space:nowrap;
}
.summary-week-deck{
  min-width:0;
  font-size:13px;
  font-weight:700;
}
.summary-week-deck a{
  color:var(--text);
  text-decoration:none;
}
.summary-week-deck a:hover{color:var(--accent)}
.summary-week-metric{
  font-size:12px;
  font-weight:700;
  color:var(--text);
  text-align:right;
  white-space:nowrap;
}
.summary-week-metric.top3{color:var(--muted)}
.summary-latest-card{
  background:

.trend-dot{width:6px;height:6px;border-radius:999px;display:inline-block;flex:0 0 auto}
.movers-side{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:start;height:100%;min-height:0}
.mover-group{display:grid;gap:4px;min-width:0}
.mover-card{

  background:linear-gradient(180deg,rgba(20,33,59,.98),rgba(16,27,48,.96));
}
.mover-card-link{
  display:grid;
  grid-template-columns:80px minmax(0,1fr);

    "media delta";
  gap:6px 8px;
  align-items:start;
  padding:5px 7px;
  color:var(--text);
  text-decoration:none;
}
.mover-card-link:hover .tier-stack-media img{

  filter:saturate(1.08) contrast(1.04) brightness(.9);

.mover-media{width:80px;grid-area:media;align-self:start}
.mover-media-fallback{
  width:80px;
  aspect-ratio:16 / 9;
  grid-area:media;
  align-self:start;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.10);
  background:linear-gradient(180deg,rgba(30,48,84,.96),rgba(18,29,52,.96));

  align-items:center;
  justify-content:center;
  overflow:hidden;
}
.mover-media-fallback .icon-stack{display:flex;align-items:center;gap:0}
.mover-media-fallback .mini-badge{width:20px;height:20px;font-size:9px}
.mover-name-text{
  grid-area:name;
  font-size:9px;
  font-weight:800;
  line-height:1.1;
  white-space:normal;
  word-break:keep-all;
  overflow-wrap:anywhere;
  align-self:start;
  min-height:2.2em;
  overflow:hidden;
}
.mover-delta{
  grid-area:delta;
  display:flex;
  align-items:flex-start;
  justify-content:flex-start;
  justify-self:start;
  align-self:start;
  font-size:15px;
  font-weight:800;
  font-variant-numeric:tabular-nums;
  white-space:nowrap;
  line-height:1;
}
.mover-empty{
  padding:16px 14px;
  border:1px dashed rgba(255,255,255,.12);
  border-radius:14px;
  color:var(--muted);
  font-size:12px;
}
.delta-up{color:var(--good)}
.delta-down{color:var(--bad)}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.chip{font-size:12px;padding:6px 10px;border-radius:999px;background:rgba(124,199,255,.12);border:1px solid rgba(124,199,255,.24)}
.chip.warn{background:rgba(255,209,102,.12);border-color:rgba(255,209,102,.26)}
.range-box{padding:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.02);border-radius:16px;margin-top:8px}
.range-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.range-head{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:center}
.range-title{font-size:12px;color:var(--muted)}
.range-value{font-size:13px;font-weight:600}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 0}
.tab{cursor:pointer;border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--muted);border-radius:999px;padding:8px 12px;font-size:12px}
.tab.active{background:rgba(124,199,255,.16);color:var(--text);border-color:#4f77c9}
select,.search,input[type="date"],input[type="number"],input[type="text"]{
  background:rgba(255,255,255,.04);
  color:var(--text);
  border:1px solid var(--line);
  border-radius:12px;
  padding:10px 12px;
  min-width:0;
  font-size:14px;
  font-weight:600;
  width:100%;
}
select{
  color:#f4f8ff;
}
select option,
select optgroup{
  color:#0b1730;
  background:#ffffff;

}
select option:checked{
  color:#ffffff;

.field{display:grid;gap:6px}

.field-grid{display:grid;gap:12px}
.field-grid.two{grid-template-columns:1fr 1fr}

.filter-block{padding:12px;border:1px solid rgba(255,255,255,.08);border-radius:16px;background:rgba(255,255,255,.02);min-width:0}
.filter-block-title{font-size:13px;font-weight:700;margin:0 0 10px}
.card-condition-list{display:grid;gap:10px}
.card-condition-row{display:grid;grid-template-columns:minmax(0,1.7fr) 92px 92px 72px;gap:8px;align-items:end}
.icon-btn,.action-btn,.copy-btn{border:none;border-radius:12px;cursor:pointer;font:inherit;transition:background .16s ease,border-color .16s ease,color .16s ease,transform .16s ease}
.icon-btn{height:44px;background:rgba(255,255,255,.04);color:var(--text);border:1px solid rgba(255,255,255,.10)}
.icon-btn:hover,.action-btn:hover,.copy-btn:hover{transform:translateY(-1px)}
.action-btn{padding:10px 12px;background:rgba(255,255,255,.04);color:var(--text);border:1px solid rgba(255,255,255,.10)}
.action-btn.primary{background:rgba(124,199,255,.18);border-color:rgba(124,199,255,.34)}
.action-btn.secondary{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.10);color:var(--muted)}
.search-actions{display:grid;gap:10px}
.sort-note{font-size:12px;color:var(--muted);line-height:1.6}
.decklist-results-head{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.decklist-results-count{font-size:13px;color:var(--muted)}
.decklist-results-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));column-gap:16px;row-gap:10px;align-items:start}
.decklist-card{display:grid;gap:2px;padding:0;border:none;background:none;box-shadow:none;overflow:visible}
.decklist-image{position:relative;aspect-ratio:16 / 8.8;max-height:240px;border-radius:0;overflow:hidden;border:none;background:transparent;display:flex;align-items:flex-start;justify-content:center}
.decklist-image img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;background:transparent}
.decklist-image::after{content:none}
.decklist-body{display:grid;gap:2px;padding:0 2px}
.decklist-name{font-size:16px;font-weight:700;line-height:1.35}
.decklist-meta{display:grid;gap:4px;color:var(--muted);font-size:13px;flex:1;min-width:0}
.decklist-footer{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:nowrap}
.copy-btn{justify-self:start;padding:7px 10px;background:rgba(124,199,255,.12);color:var(--text);border:1px solid rgba(124,199,255,.24);font-size:12px;border-radius:10px;white-space:nowrap;flex:0 0 auto;margin-left:auto}
.copy-btn[disabled]{cursor:not-allowed;opacity:.56;transform:none}
.decklist-results-count-inline{display:inline-flex;align-items:baseline;margin-left:10px;font-size:13px;font-weight:600;color:var(--muted)}
.empty-state{padding:28px;border:1px dashed rgba(255,255,255,.18);border-radius:18px;background:rgba(255,255,255,.02);display:grid;gap:8px;place-items:center;text-align:center}
.empty-title{font-size:18px;font-weight:700}
.empty-desc{font-size:13px;color:var(--muted);max-width:520px;line-height:1.7}
.label-with-icon{display:inline-flex;align-items:center;gap:8px;min-width:0;vertical-align:middle}
.label-text{min-width:0}
.icon-stack{display:inline-flex;align-items:center}
.mini-badge{
  width:22px;
  height:22px;
  border-radius:50%;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:10px;
  font-weight:800;
  line-height:1;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(255,255,255,.05);
}
.icon-stack .mini-badge + .mini-badge{margin-left:-6px}
.mini-badge.dragon{background:rgba(124,199,255,.20)}
.mini-badge.fire{background:rgba(255,157,120,.20)}
.mini-badge.steel{background:rgba(196,210,232,.20)}
.mini-badge.psychic{background:rgba(255,157,178,.20)}
.mini-badge.water{background:rgba(123,205,255,.20)}
.mini-badge.grass{background:rgba(140,240,178,.20)}
.mini-badge.dark{background:rgba(179,164,255,.20)}
.mini-badge.electric{background:rgba(255,209,102,.22)}
.mini-badge.normal{background:rgba(255,255,255,.12)}
.mini-badge.stadium{background:rgba(255,209,102,.22)}
.mini-badge.trainer{background:rgba(140,240,178,.18)}
.mini-badge.energy{background:rgba(255,157,178,.18)}
.mini-badge.group{background:rgba(199,166,255,.18)}
.mini-badge.type{background:rgba(140,240,178,.20)}
.mini-badge.neutral{background:rgba(255,255,255,.12)}
.pill{display:inline-block;padding:4px 8px;border-radius:999px;font-size:11px;font-weight:700}
.tier1{background:rgba(116,228,167,.15);color:#9ff1c6}
.tier2{background:rgba(124,199,255,.16);color:#a7dcff}
.tier3{background:rgba(255,209,102,.16);color:#ffe49b}
.tier4{background:rgba(255,157,178,.16);color:#ffc6d3}
.note-box{padding:12px 14px;border:1px dashed rgba(255,255,255,.16);border-radius:14px;font-size:13px;color:var(--muted);background:rgba(255,255,255,.02);line-height:1.65}
.sidebar .side-accordion-body{overflow-x:hidden}
.sidebar .decklist-filter-panel .field-grid.two{grid-template-columns:1fr}
.sidebar .decklist-filter-panel .card-condition-list{min-width:0}
.sidebar .decklist-filter-panel .card-condition-row{grid-template-columns:1fr;min-width:0}
.sidebar .decklist-filter-panel .card-condition-row .field:first-child{grid-column:auto}
.sidebar .decklist-filter-panel .icon-btn{width:100%;height:40px;font-size:13px}
.sidebar .decklist-filter-panel .sort-note{display:none}
.sidebar #decklistSidebarMount{max-height:calc(100vh - 220px);overflow-y:auto;overflow-x:hidden;padding-right:4px}
.svg-wrap{
  position:relative;
  background:rgba(255,255,255,.02);
  border-radius:16px;
  padding:8px;
  border:1px solid rgba(255,255,255,.06);
}
.chart-panel .svg-wrap{flex:1;min-height:0;display:flex}
.chart-panel svg{width:100%;height:100%}

  .trend-legend{grid-template-columns:repeat(2,minmax(0,1fr))}

  .summary-week-head,.summary-week-row{grid-template-columns:72px minmax(0,1fr) 68px 76px}

    height:auto;
    overflow-x:hidden;
    overflow-y:visible;
    padding:74px 16px 28px;

  .hero{grid-template-columns:1fr}
  .hero-period{justify-self:start;text-align:left;padding-top:0;white-space:normal}
  .page-scroller{
    overflow-x:hidden;
    overflow-y:visible;
    scroll-snap-type:none;
    padding-right:0;
  }
  .view-section{
    height:auto;
    flex-basis:auto;
    min-height:auto;
    max-height:none;

  .card-condition-row{grid-template-columns:minmax(0,1fr) 1fr 1fr 72px}
}

  .card-condition-row{grid-template-columns:1fr 1fr}
}

    totalWins += Number(entry.totals.wins || 0);
    Object.entries(entry.decks || {}).forEach(([name, raw]) => {
      const [count, top4, wins, archetype] = raw;
      if (!map[name]) map[name] = {name, archetype, count:0, top4:0, wins:0};
      map[name].count += Number(count || 0);
      map[name].top4 += Number(top4 || 0);
      map[name].wins += Number(wins || 0);
      if (!map[name].archetype) map[name].archetype = archetype || "";
    });
  });
  return Object.values(map)
    .filter(item => !strictOther(item.name))
    .map(item => ({
      ...item,
      usage: total ? item.count / total * 100 : 0,
      b4: totalTop4 ? item.top4 / totalTop4 * 100 : 0,
      win: totalWins ? item.wins / totalWins * 100 : 0,
      top4_rate: item.count ? item.top4 / item.count * 100 : 0,
      win_rate: item.count ? item.wins / item.count * 100 : 0,

    out += `<line x1="${left}" y1="${yy}" x2="${W - right}" y2="${yy}" stroke="rgba(255,255,255,.08)"/>`;
    out += `<text x="${left - 8}" y="${yy + 4}" text-anchor="end" font-size="11" fill="#aab7d3">${val}%</text>`;
  }
  rows.forEach((row, index) => {
    const label = `${row.label}${row.stable ? "" : "*"}`;
    out += `<text x="${xpoints[index]}" y="${H - 10}" text-anchor="middle" font-size="11" fill="#aab7d3">${label}</text>`;
  });
  let lower = Array(rows.length).fill(0);
  scopedLines.forEach(line => {
    const valuesForLine = line.rows.map(row => Number(row[key] || 0));
    const upper = valuesForLine.map((value, index) => lower[index] + value);
    const topPath = upper.map((value, index) => `${index === 0 ? "M" : "L"} ${xpoints[index]} ${y(value)}`).join(" ");
    const bottomPath = lower.map((value, index) => `${xpoints[index]} ${y(value)}`).reverse().join(" L ");

    out += `<polyline fill="none" stroke="${line.color}" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" opacity=".95" points="${upper.map((value, index) => `${xpoints[index]},${y(value)}`).join(" ")}"/>`;
    line.rows.forEach((row, index) => {
      const rawValue = valuesForLine[index];

      const fill = row?.stable ? line.color : "rgba(9,17,31,.95)";
      const stroke = row?.stable ? line.color : "#ffd166";
      out += `<circle cx="${xpoints[index]}" cy="${y(stackedValue)}" r="2.7" fill="${fill}" stroke="${stroke}" stroke-width="1.4"/>`;
      out += `<circle class="trend-point-hit" cx="${xpoints[index]}" cy="${y(stackedValue)}" r="9" fill="transparent" data-name="${escapeHtml(line.name)}" data-label="${escapeHtml(row.label)}" data-value="${rawValue.toFixed(1)}"/>`;
    });
    lower = upper;
  });
  svg.innerHTML = out;
  if (!wrap) return;
  let tip = qs(".trend-hover-tip", wrap);
  if (!tip){
    tip = document.createElement("div");
    tip.className = "trend-hover-tip";
    wrap.appendChild(tip);

    hit.addEventListener("mouseenter", event => {

    });
    hit.addEventListener("mousemove", event => {
      const node = event.currentTarget;

    });
    hit.addEventListener("mouseleave", () => {
      tip.style.display = "none";
    });
  });
}

  sectionObserver = new IntersectionObserver(entries => {
    const visible = entries
      .filter(entry => entry.isIntersecting)
      .sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];
    if (visible) activateSectionLink(visible.target.id);
  }, {root, threshold:[0.45, 0.66, 0.9]});
  sections.forEach(section => sectionObserver.observe(section));
  const initialHash = normalizedSectionHash();
  const initialTarget = initialHash ? qs(`#${initialHash}`) : sections[0];
  if (initialTarget){
    if (!preserveScroll){
      requestAnimationFrame(() => initialTarget.scrollIntoView({block:"start"}));
    }
    activateSectionLink(initialTarget.id);
  }
}

function deckTierLabel(name, deckStats=aggregateDeckStats()){
  for (const bucket of tiersFromUsage(deckStats)){

}

function archetypeTrendLines(series){

function archetypeSummaryMediaHtml(name){

function weekSeriesArchetypeDeckShare(archetypeName, deckName){
  return weekKeys().map(week => {
    const entry = weekEntry(week);
    const archetypeRaw = entry.archetypes[archetypeName] || [0, 0, 0];
    const deckRaw = entry.decks[deckName] || [0, 0, 0, ""];
    const archetypeCount = Number(archetypeRaw[0] || 0);
    const deckCount = deckRaw[3] === archetypeName ? Number(deckRaw[0] || 0) : 0;
    return {
      week,
      label: DATA.week_labels[week],
      stable: !!entry.totals.stable,
      share: archetypeCount ? deckCount / archetypeCount * 100 : 0,
    };
  });
}
function archetypeBreakdownRows(name, weeks=currentWeeks()){
  return breakdownWithinArchetype(name, weeks).map(item => ({
    ...item,
    delta: adjacentWeekDelta(weekSeriesArchetypeDeckShare(name, item.name), "share"),
  }));
}

                    </div>
                  </div>
                  <div class="deck-summary-metric-sub top4">TOP4シェア率 ${fmtPct(deck.b4)}</div>
                </div>
                <div class="deck-summary-metric-card win">
                  <div class="deck-summary-metric-main">
                    <span class="tier-stat-icon win">${metricIconSvg("win")}</span>
                    <div class="deck-summary-metric-value-row">
                      <div class="deck-summary-metric-value">${fmtPct(deck.win_rate)}</div>
                      ${tooltipIcon("そのデッキの出場数に対して優勝した比率です。試合単位の勝率ではありません。", "left")}
                    </div>
                  </div>
                  <div class="deck-summary-metric-sub win">優勝シェア率 ${fmtPct(deck.win)}</div>
                </div>
              </div>
              <div class="card-summary-trend-box deck-summary-trend-box-panel">
                <div class="deck-summary-trend-head">
                  <div class="deck-summary-trend-head-main">
                    <div class="deck-summary-trend-title">週次推移</div>
                    ${tooltipIcon("使用率・TOP4シェア率・優勝シェア率を週ごとに表示します。プロットにカーソルを合わせると数値を表示します。参考週には * が付きます。", "left")}
                  </div>
                  <div class="deck-summary-delta-note">使用率の直近変化 ${fmtSigned(recentDelta)}</div>
                </div>
                <div class="svg-wrap">
                  <svg id="deckTrend" viewBox="0 0 760 260" width="100%" height="100%"></svg>
                </div>
              </div>
            </div>
          </div>
        </div>
      `
    ),
    screenSection(
      "deck-cards",
      "",
      "採用カード",
      "そのデッキでよく使われるカードと平均採用枚数を確認します。",
      tablePanel(`${renderName(activeDeckName)} の採用カード TOP20`, "", `<table class="table"><thead><tr><th>#</th><th>カード</th><th>採用率</th><th>平均枚数</th></tr></thead><tbody>${cards.map((item, index) => `<tr><td>${index + 1}</td><td>${renderLinked("card", item.name)}</td><td>${fmtPct(item.rate)}</td><td>${item.avgCopies.toFixed(2)}</td></tr>`).join("")}</tbody></table>`)
    ),
  ];
  qs("#pageBody").innerHTML = sections.join("");
  const deckCardsHead = qs("#deck-cards > .view-shell > .view-stage > .panel > .panel-head");
  if (deckCardsHead) deckCardsHead.remove();
  const deckCardsWrap = qs("#deck-cards .table-wrap");
  if (deckCardsWrap){
    deckCardsWrap.classList.add("deck-cards-wrap");
    deckCardsWrap.innerHTML = deckCardsPanelsHtml;
  }
  qs("#deckSummaryArchetype")?.addEventListener("change", event => {
    const nextArchetype = String(event.currentTarget.value || "").trim();
    const nextDeck = decks.find(item => item.archetype === nextArchetype)?.name || names[0] || "";
    if (nextDeck) setSelection("deck", nextDeck);
  });
  qs("#deckSummaryDeck")?.addEventListener("change", event => {
    const nextDeck = String(event.currentTarget.value || "").trim();
    if (nextDeck) setSelection("deck", nextDeck);
  });
  drawMultiLine("deckTrend", trendLines, "value");
}
function renderDecklists(){
  const state = decklistSearchState();
  decklistDraftState = state;
  const rows = filteredDecklistRows(state);
  qs("#pageTitle").textContent = PAGE_TITLES.decklists;
  qs("#breadcrumbs").innerHTML = `<a href="${pageFile("decklists")}">デッキリスト検索</a>`;
  const content = rows.length
    ? `<div class="decklist-results-grid">${rows.map(decklistResultCard).join("")}</div>`
    : `
      <div class="empty-state">
        <div class="empty-title">条件に合うデッキリストがありません</div>
        <div class="empty-desc">アーキタイプ、開催日、順位、採用カード条件を見直すか、条件をリセットしてもう一度検索してください。データ接続前でも壊れないように空状態を表示しています。</div>
      </div>`;
  const sections = [
    screenSection(
      "decklist-results",
      "",
      `検索結果<span class="decklist-results-count-inline">${rows.length}件</span>`,
      "デッキ画像・デッキ名・大会順位・開催日・デッキコードを一覧表示します。",
      `
        <div class="panel panel-scroll">
          <div class="table-wrap">${content}</div>
        </div>`
    ),
  ];
  qs("#pageBody").innerHTML = sections.join("");
  bindDecklistResultActions();
}
function renderCards(){
  const allCardNames = [...new Set((DATA.meta_card_names || []).concat(Object.keys(currentWeeks().reduce((acc, week) => Object.assign(acc, weekEntry(week).cards || {}), {}))))];
  const cards = aggregateCardStats(currentWeeks(), allCardNames);
  const names = cards.map(item => item.name);
  const selected = currentSelection("card", names);
  const summary = cards.find(item => item.name === selected) || {rate:0, decks:0, avgCopiesWhenUsed:0};
  const deckRows = decksUsingCard(selected).map((item, index) => ({...item, rank:index + 1}));
  const sortedDeckRows = sortedCardUsageRows(deckRows);
  const series = weekSeriesCard(selected);
  const recentDelta = adjacentWeekDelta(series, "rate");
  const selectedCardImage = cardImageSrcByName(selected);
  qs("#pageTitle").textContent = PAGE_TITLES.cards;
  qs("#breadcrumbs").innerHTML = `<a href="${pageFile("index")}">環境全体</a><span class="sep">/</span><a href="${pageFile("cards")}">カード分析</a><span class="sep">/</span><span>${renderName(selected)}</span>`;
  const sections = [
    screenSection(
      "card-summary",
      "",
      "カード選択",
      "カードを選んで、採用率・平均枚数・直近変化と週別採用率を確認できます。",
      `
        <div class="card-summary-toolbar">
          <div class="field">
            <input type="text" id="cardSelectInput" class="search" list="cardSelectOptions" value="${escapeHtml(selected)}" placeholder="カード名を入力" autocomplete="off" aria-label="カード名">
            <datalist id="cardSelectOptions">${names.map(name => `<option value="${escapeHtml(name)}"></option>`).join("")}</datalist>
          </div>
        </div>
        <div class="panel panel-scroll">
          <div class="card-summary-hero">
            <div class="card-summary-media">
              ${selectedCardImage
                ? `<img src="${escapeHtml(selectedCardImage)}" alt="${escapeHtml(selected)}" loading="lazy">`
                : `<div class="card-summary-fallback"><span class="card-summary-fallback-text">画像なし</span></div>`}
            </div>
            <div class="card-summary-right">
              <div class="card-summary-metrics">
                <div class="card-summary-stat">
                  <div class="card-summary-stat-label">採用率</div>
                  <div class="card-summary-stat-value">${fmtPct(summary.rate)}</div>
                </div>
                <div class="card-summary-stat">
                  <div class="card-summary-stat-label">直近変化</div>
                  <div class="card-summary-stat-value">${fmtSigned(recentDelta)}</div>
                </div>
                <div class="card-summary-stat">
                  <div class="card-summary-stat-label">平均枚数</div>
                  <div class="card-summary-stat-value">${(summary.avgCopiesWhenUsed || 0).toFixed(2)}</div>
                </div>
              </div>
              <div class="card-summary-trend-box">
                <div class="card-summary-trend-head">
                  <div class="card-summary-trend-title">週別採用率</div>
                  ${tooltipIcon("プロットにカーソルを合わせると、その週の採用率を表示します。参考週には * が付きます。", "left")}
                </div>
                <div class="svg-wrap">
                  <svg id="cardTrend" viewBox="0 0 760 260" width="100%" height="100%"></svg>
                </div>
              </div>
            </div>
          </div>
        </div>
      `
    ),
    screenSection(
      "card-usage",
      "",
      "採用先分析",
      "どのデッキで使われているかを詳しく確認します。",
      `
        ${tablePanel("", "", `<table class="table"><thead><tr><th>${cardUsageSortHead("#", "rank")}</th><th>${cardUsageSortHead("デッキ", "name")}</th><th>${cardUsageSortHead("構成比", "cardRate", "構成比は、このカードを採用した全デッキのうち各デッキが占める比率です。")}</th><th>${cardUsageSortHead("採用率", "adoptionRate")}</th><th>${cardUsageSortHead("直近変化", "recentDelta")}</th><th>${cardUsageSortHead("平均枚数", "avgCopies")}</th><th>${cardUsageSortHead("平均枚数変化", "avgCopiesDelta")}</th></tr></thead><tbody>${sortedDeckRows.map(item => `<tr><td>${item.rank}</td><td>${renderLinked("deck", item.name)}</td><td>${fmtPct(item.cardRate)}</td><td>${fmtPct(item.adoptionRate)}</td><td>${fmtSigned(item.recentDelta)}</td><td>${item.avgCopies.toFixed(2)}</td><td>${fmtSigned(item.avgCopiesDelta)}</td></tr>`).join("")}</tbody></table>`)}
      `
    ),
  ];
  qs("#pageBody").innerHTML = sections.join("");
  const cardSelectInput = qs("#cardSelectInput");
  const applyCardSelection = value => {
    const next = String(value || "").trim();
    if (!next || !names.includes(next)) return false;
    if (next === selected) return true;
    setSelection("card", next);
    return true;
  };
  const syncCardSelection = () => {
    if (!cardSelectInput) return;
    if (!applyCardSelection(cardSelectInput.value)) cardSelectInput.value = selected;
  };
  cardSelectInput?.addEventListener("input", event => {
    const next = String(event.currentTarget.value || "").trim();
    if (next && names.includes(next) && next !== selected) setSelection("card", next);
  });
  cardSelectInput?.addEventListener("change", syncCardSelection);
  cardSelectInput?.addEventListener("blur", syncCardSelection);
  cardSelectInput?.addEventListener("keydown", event => {
    if (event.key !== "Enter") return;
    event.preventDefault();
    syncCardSelection();
  });
  bindCardUsageSortControls();
  drawLine("cardTrend", series, "rate", "#7cc7ff", selected);
}
function renderPage(options={}){
  const preserveScroll = !!options.preserveScroll;
  const pageBody = qs("#pageBody");
  const scrollState = preserveScroll && pageBody
    ? {top: pageBody.scrollTop}
    : null;
  updatePeriodVisuals();
  if (PAGE === "index") renderIndexV2();
  if (PAGE === "archetypes") renderArchetypes();
  if (PAGE === "decks") renderDecks();
  if (PAGE === "cards") renderCards();
  if (PAGE === "decklists") renderDecklists();
  bindSectionNavigation({preserveScroll});
  requestAnimationFrame(clampHorizontalLayout);
  if (scrollState){
    requestAnimationFrame(() => {
      const nextPageBody = qs("#pageBody");
      if (!nextPageBody) return;
      nextPageBody.scrollTop = scrollState.top;
      nextPageBody.scrollLeft = 0;
    });
  }
}
window.addEventListener("hashchange", () => {
  const target = qs(`#${normalizedSectionHash()}`);
  if (target) target.scrollIntoView({behavior:"smooth", block:"start"});
});
document.addEventListener("DOMContentLoaded", () => {
  migrateLegacyHash();
  initShell();
  setSidebarOpen(isDesktop());
  syncSidebarMode();
  renderPage();
});
</script>
</body>
</html>
